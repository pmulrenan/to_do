<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List</title>

  <!-- Modern font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg0:#070A12;
      --bg1:#0B1022;
      --card: rgba(255,255,255,.08);
      --card2: rgba(255,255,255,.06);
      --border: rgba(255,255,255,.14);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.62);
      --shadow: 0 18px 60px rgba(0,0,0,.45);

      --a: #7C3AED; /* violet */
      --b: #22D3EE; /* cyan  */
      --good:#34D399; /* green */
      --bad:#FB7185;  /* rose  */

      --r: 20px;
    }

    *{ box-sizing:border-box; }
    html, body { height: 100%; }
    body{
      margin:0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1000px 700px at 10% 10%, rgba(124,58,237,.35), transparent 55%),
        radial-gradient(900px 600px at 90% 20%, rgba(34,211,238,.25), transparent 60%),
        radial-gradient(900px 700px at 50% 100%, rgba(16,185,129,.14), transparent 60%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 28px 14px;
    }

    .wrap{
      width:min(720px, 100%);
      display:grid;
      gap: 14px;
    }

    .card{
      border-radius: var(--r);
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.06));
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      overflow:hidden;
    }

    header{
      padding: 22px 22px 16px;
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,.10);
      background: linear-gradient(90deg, rgba(124,58,237,.16), rgba(34,211,238,.10), transparent 70%);
    }

    .title{
      display:flex;
      flex-direction:column;
      gap: 6px;
    }

    h1{
      font-size: 18px;
      line-height: 1.1;
      margin:0;
      letter-spacing: -0.02em;
      font-weight: 700;
    }

    .subtitle{
      margin:0;
      font-size: 13px;
      color: var(--muted);
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.20);
      font-size: 12px;
      color: var(--muted);
      user-select:none;
      white-space:nowrap;
    }

    .dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background: linear-gradient(180deg, var(--b), var(--a));
      box-shadow: 0 0 0 3px rgba(34,211,238,.12);
    }

    .main{
      padding: 18px 22px 22px;
      display:grid;
      gap: 14px;
    }

    /* Input row */
    .row{
      display:flex;
      gap: 10px;
      align-items:center;
    }

    .field{
      flex:1;
      display:flex;
      align-items:center;
      gap: 10px;
      padding: 12px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.22);
      transition: border-color .2s ease, transform .2s ease;
    }

    .field:focus-within{
      border-color: rgba(34,211,238,.45);
      box-shadow: 0 0 0 4px rgba(34,211,238,.10);
      transform: translateY(-1px);
    }

    .field svg{
      width:18px;
      height:18px;
      opacity:.75;
      flex:none;
    }

    input[type="text"]{
      width:100%;
      border:0;
      outline:0;
      background: transparent;
      color: var(--text);
      font-size: 14px;
      caret-color: var(--b);
    }

    input::placeholder{ color: rgba(255,255,255,.45); }

    .btn{
      flex:none;
      border:0;
      cursor:pointer;
      padding: 12px 14px;
      border-radius: 14px;
      color: rgba(255,255,255,.94);
      font-weight: 600;
      font-size: 14px;
      letter-spacing: -0.01em;
      background: linear-gradient(135deg, rgba(34,211,238,.95), rgba(124,58,237,.95));
      box-shadow: 0 14px 30px rgba(124,58,237,.18);
      transition: transform .15s ease, filter .15s ease;
      user-select:none;
    }

    .btn:hover{ transform: translateY(-1px); filter: brightness(1.05); }
    .btn:active{ transform: translateY(0px); filter: brightness(.98); }
    .btn:disabled{
      opacity:.45;
      cursor:not-allowed;
      transform:none;
      filter:none;
    }

    /* List */
    ul{
      list-style:none;
      padding:0;
      margin:0;
      display:grid;
      gap: 10px;
    }

    .item{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      padding: 12px 12px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.12);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.04));
      transition: transform .15s ease, border-color .2s ease, background .2s ease;
      will-change: transform;
    }

    .item:hover{
      transform: translateY(-1px);
      border-color: rgba(255,255,255,.18);
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.05));
    }

    .left{
      display:flex;
      align-items:center;
      gap: 10px;
      min-width: 0;
    }

    .check{
      width: 22px;
      height: 22px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,.20);
      background: rgba(0,0,0,.18);
      display:grid;
      place-items:center;
      flex:none;
      cursor:pointer;
      transition: background .15s ease, border-color .15s ease, transform .1s ease;
    }

    .check:hover{ transform: scale(1.02); }
    .check svg{ width:14px; height:14px; opacity:0; transform: scale(.7); transition: .15s ease; }

    .text{
      font-size: 14px;
      line-height: 1.25;
      overflow:hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: rgba(255,255,255,.92);
    }

    .actions{
      display:flex;
      align-items:center;
      gap: 8px;
      flex:none;
    }

    .iconBtn{
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.18);
      color: rgba(255,255,255,.85);
      border-radius: 12px;
      padding: 10px;
      cursor:pointer;
      transition: transform .15s ease, border-color .2s ease, background .2s ease;
      display:grid;
      place-items:center;
    }

    .iconBtn:hover{
      transform: translateY(-1px);
      border-color: rgba(255,255,255,.22);
      background: rgba(0,0,0,.24);
    }

    .iconBtn:active{ transform: translateY(0px); }

    .iconBtn svg{ width:16px; height:16px; opacity:.9; }

    /* Completed state */
    .item.completed{
      border-color: rgba(52,211,153,.35);
      background: linear-gradient(180deg, rgba(52,211,153,.10), rgba(255,255,255,.04));
    }

    .item.completed .text{
      color: rgba(255,255,255,.55);
      text-decoration: line-through;
      text-decoration-thickness: 2px;
      text-decoration-color: rgba(52,211,153,.55);
    }

    .item.completed .check{
      border-color: rgba(52,211,153,.55);
      background: rgba(52,211,153,.16);
    }

    .item.completed .check svg{
      opacity: 1;
      transform: scale(1);
    }

    /* Footer */
    .footer{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap: 10px;
      padding-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .linkBtn{
      border: 0;
      background: transparent;
      color: rgba(255,255,255,.74);
      cursor:pointer;
      padding: 6px 8px;
      border-radius: 10px;
      transition: background .15s ease, color .15s ease;
    }
    .linkBtn:hover{
      background: rgba(255,255,255,.08);
      color: rgba(255,255,255,.88);
    }

    /* Empty state */
    .empty{
      border-radius: 16px;
      border: 1px dashed rgba(255,255,255,.18);
      background: rgba(0,0,0,.12);
      padding: 16px;
      color: rgba(255,255,255,.62);
      font-size: 13px;
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce){
      *{ transition:none !important; animation:none !important; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <header>
        <div class="title">
          <h1>To-Do</h1>
          <p class="subtitle">Fast, clean, and satisfying. Press <b>Enter</b> to add.</p>
        </div>
        <div class="badge" id="countBadge" aria-live="polite">
          <span class="dot" aria-hidden="true"></span>
          <span><span id="remainingCount">0</span> remaining</span>
        </div>
      </header>

      <div class="main">
        <div class="row">
          <div class="field">
            <!-- plus icon -->
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <input id="taskInput" type="text" placeholder="Add a task…" autocomplete="off" />
          </div>
          <button class="btn" id="addBtn" type="button">Add</button>
        </div>

        <div id="emptyState" class="empty" hidden>
          No tasks yet. Add your first one above ✨
        </div>

        <ul id="taskList"></ul>

        <div class="footer">
          <span id="totalCount">0 tasks</span>
          <button class="linkBtn" id="clearCompletedBtn" type="button">Clear completed</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const taskInput = document.getElementById('taskInput');
    const taskList = document.getElementById('taskList');
    const addBtn = document.getElementById('addBtn');

    const remainingCountEl = document.getElementById('remainingCount');
    const totalCountEl = document.getElementById('totalCount');
    const emptyStateEl = document.getElementById('emptyState');
    const clearCompletedBtn = document.getElementById('clearCompletedBtn');

    function updateCounts() {
      const items = Array.from(taskList.querySelectorAll('.item'));
      const completed = items.filter(i => i.classList.contains('completed')).length;
      const total = items.length;
      const remaining = total - completed;

      remainingCountEl.textContent = remaining;
      totalCountEl.textContent = `${total} task${total === 1 ? '' : 's'}`;
      emptyStateEl.hidden = total !== 0;

      // Disable clear button when nothing to clear
      clearCompletedBtn.disabled = completed === 0;
      clearCompletedBtn.style.opacity = completed === 0 ? 0.5 : 1;
      clearCompletedBtn.style.cursor = completed === 0 ? 'not-allowed' : 'pointer';
    }

    function createItem(text) {
      const li = document.createElement('li');
      li.className = 'item';

      li.innerHTML = `
        <div class="left">
          <button class="check" type="button" aria-label="Mark complete">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M20 7L10 17l-4-4" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <span class="text" title="${escapeHtml(text)}">${escapeHtml(text)}</span>
        </div>
        <div class="actions">
          <button class="iconBtn deleteBtn" type="button" aria-label="Delete task">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      `;

      // Toggle complete
      li.querySelector('.check').addEventListener('click', () => {
        li.classList.toggle('completed');
        updateCounts();
      });

      // Delete
      li.querySelector('.deleteBtn').addEventListener('click', () => {
        li.remove();
        updateCounts();
      });

      return li;
    }

    function addTask() {
      const text = taskInput.value.trim();
      if (!text) return;

      taskList.appendChild(createItem(text));
      taskInput.value = '';
      taskInput.focus();
      updateCounts();
    }

    function escapeHtml(str) {
      return str
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    // Add via button
    addBtn.addEventListener('click', addTask);

    // Add via Enter
    taskInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addTask();
    });

    // Clear completed
    clearCompletedBtn.addEventListener('click', () => {
      taskList.querySelectorAll('.item.completed').forEach(el => el.remove());
      updateCounts();
    });

    // Initial
    updateCounts();
    taskInput.focus();
  </script>
</body>
</html>

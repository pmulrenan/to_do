<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List</title>

  <!-- Modern font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg0:#f5f7ff;
      --bg1:#eef2ff;
      --card: rgba(255,255,255,.75);
      --border: rgba(0,0,0,.08);
      --text: #1f2937;
      --muted: #6b7280;

      --a: #6366f1; /* indigo */
      --b: #06b6d4; /* cyan */
      --good:#10b981; /* green */
      --bad:#ef4444;  /* red */

      --r: 20px;
    }

    *{ box-sizing: border-box; }
    html, body { height: 100%; }

    body{
      margin:0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 600px at 10% 10%, rgba(99,102,241,.15), transparent 55%),
        radial-gradient(900px 600px at 90% 20%, rgba(6,182,212,.12), transparent 60%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 28px 14px;
    }

    .wrap{
      width: min(720px, 100%);
      display:grid;
      gap: 14px;
    }

    .card{
      border-radius: var(--r);
      background: var(--card);
      border: 1px solid var(--border);
      box-shadow: 0 20px 60px rgba(0,0,0,.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      overflow:hidden;
    }

    header{
      padding: 22px;
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap: 12px;
      border-bottom: 1px solid rgba(0,0,0,.05);
      background: linear-gradient(90deg, rgba(99,102,241,.08), rgba(6,182,212,.06), transparent 70%);
    }

    .title{
      display:flex;
      flex-direction:column;
      gap: 6px;
    }

    h1{
      margin:0;
      font-size:18px;
      font-weight:700;
      letter-spacing:-0.02em;
      line-height:1.15;
    }

    .subtitle{
      margin:0;
      font-size:13px;
      color:var(--muted);
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap: 8px;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid rgba(0,0,0,.08);
      background:white;
      font-size:12px;
      color:var(--muted);
      user-select:none;
      white-space:nowrap;
      box-shadow: 0 10px 25px rgba(0,0,0,.04);
    }

    .dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background: linear-gradient(135deg, var(--a), var(--b));
      box-shadow: 0 0 0 3px rgba(99,102,241,.10);
    }

    .main{
      padding: 18px 22px 22px;
      display:grid;
      gap: 14px;
    }

    .row{
      display:flex;
      gap:10px;
      align-items:center;
    }

    .field{
      flex:1;
      display:flex;
      align-items:center;
      gap:10px;
      padding:12px 12px;
      border-radius:14px;
      border:1px solid rgba(0,0,0,.08);
      background:white;
      transition: border-color .2s ease, box-shadow .2s ease, transform .2s ease;
    }

    .field:focus-within{
      border-color: rgba(99,102,241,.40);
      box-shadow: 0 0 0 4px rgba(99,102,241,.08);
      transform: translateY(-1px);
    }

    .field svg{
      width:18px;
      height:18px;
      color: rgba(31,41,55,.65);
      flex:none;
    }

    input[type="text"]{
      width:100%;
      border:0;
      outline:0;
      background:transparent;
      font-size:14px;
      color:var(--text);
      caret-color: var(--a);
    }

    input::placeholder{
      color: rgba(107,114,128,.85);
    }

    .btn{
      flex:none;
      border:0;
      cursor:pointer;
      padding:12px 16px;
      border-radius:14px;
      font-weight:600;
      font-size:14px;
      color:white;
      background: linear-gradient(135deg, var(--a), var(--b));
      box-shadow: 0 10px 25px rgba(99,102,241,.25);
      transition: transform .15s ease, filter .15s ease, box-shadow .15s ease;
      user-select:none;
    }

    .btn:hover{
      transform: translateY(-1px);
      filter: brightness(1.02);
      box-shadow: 0 14px 30px rgba(99,102,241,.30);
    }
    .btn:active{
      transform: translateY(0);
      filter: brightness(.98);
    }

    ul{
      list-style:none;
      padding:0;
      margin:0;
      display:grid;
      gap:10px;
    }

    .item{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap: 10px;
      padding:12px;
      border-radius:16px;
      border:1px solid rgba(0,0,0,.06);
      background:white;
      transition: transform .15s ease, box-shadow .2s ease, border-color .2s ease;
      will-change: transform;
    }

    .item:hover{
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(0,0,0,.06);
      border-color: rgba(0,0,0,.08);
    }

    .left{
      display:flex;
      align-items:center;
      gap: 10px;
      min-width: 0;
    }

    .check{
      width: 22px;
      height: 22px;
      border-radius: 8px;
      border: 1px solid rgba(0,0,0,.10);
      background: rgba(99,102,241,.06);
      display:grid;
      place-items:center;
      flex:none;
      cursor:pointer;
      transition: transform .1s ease, background .15s ease, border-color .15s ease;
    }

    .check:hover{ transform: scale(1.02); }

    .check svg{
      width:14px;
      height:14px;
      opacity:0;
      transform: scale(.7);
      transition: .15s ease;
      color: var(--good);
    }

    .text{
      font-size:14px;
      line-height: 1.25;
      overflow:hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text);
    }

    .actions{
      display:flex;
      align-items:center;
      gap: 8px;
      flex:none;
    }

    .iconBtn{
      border:1px solid rgba(0,0,0,.08);
      background: white;
      color: rgba(31,41,55,.80);
      border-radius:12px;
      padding:10px;
      cursor:pointer;
      transition: transform .15s ease, background .2s ease, border-color .2s ease;
      display:grid;
      place-items:center;
    }

    .iconBtn:hover{
      transform: translateY(-1px);
      background:#f9fafb;
      border-color: rgba(0,0,0,.10);
    }

    .iconBtn svg{ width:16px; height:16px; }

    .item.completed{
      background: rgba(16,185,129,.08);
      border-color: rgba(16,185,129,.25);
    }

    .item.completed .text{
      color: var(--muted);
      text-decoration: line-through;
      text-decoration-thickness: 2px;
      text-decoration-color: rgba(16,185,129,.55);
    }

    .item.completed .check{
      border-color: rgba(16,185,129,.35);
      background: rgba(16,185,129,.12);
    }

    .item.completed .check svg{
      opacity: 1;
      transform: scale(1);
    }

    .empty{
      border-radius: 16px;
      border: 1px dashed rgba(0,0,0,.14);
      background: rgba(255,255,255,.6);
      padding: 16px;
      color: var(--muted);
      font-size: 13px;
    }

    .footer{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap: 10px;
      padding-top: 6px;
      font-size:12px;
      color: var(--muted);
    }

    .linkBtn{
      border:0;
      background: transparent;
      color: var(--a);
      cursor:pointer;
      padding: 6px 8px;
      border-radius: 10px;
      transition: background .15s ease, color .15s ease;
      font-weight: 500;
    }

    .linkBtn:hover{
      background: rgba(99,102,241,.08);
      color: #4f46e5;
    }

    .linkBtn:disabled{
      opacity:.55;
      cursor:not-allowed;
    }

    @media (prefers-reduced-motion: reduce){
      *{ transition:none !important; animation:none !important; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <header>
        <div class="title">
          <h1>To-Do</h1>
          <p class="subtitle">Press <b>Enter</b> to add. Click the checkbox to complete.</p>
        </div>
        <div class="badge" id="countBadge" aria-live="polite">
          <span class="dot" aria-hidden="true"></span>
          <span><span id="remainingCount">0</span> remaining</span>
        </div>
      </header>

      <div class="main">
        <div class="row">
          <div class="field">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <input id="taskInput" type="text" placeholder="Add a task…" autocomplete="off" />
          </div>
          <button class="btn" id="addBtn" type="button">Add</button>
        </div>

        <div id="emptyState" class="empty" hidden>
          No tasks yet. Add your first one above ✨
        </div>

        <ul id="taskList"></ul>

        <div class="footer">
          <span id="totalCount">0 tasks</span>
          <button class="linkBtn" id="clearCompletedBtn" type="button">Clear completed</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const taskInput = document.getElementById('taskInput');
    const taskList = document.getElementById('taskList');
    const addBtn = document.getElementById('addBtn');

    const remainingCountEl = document.getElementById('remainingCount');
    const totalCountEl = document.getElementById('totalCount');
    const emptyStateEl = document.getElementById('emptyState');
    const clearCompletedBtn = document.getElementById('clearCompletedBtn');

    function escapeHtml(str) {
      return str
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function updateCounts() {
      const items = Array.from(taskList.querySelectorAll('.item'));
      const completed = items.filter(i => i.classList.contains('completed')).length;
      const total = items.length;
      const remaining = total - completed;

      remainingCountEl.textContent = remaining;
      totalCountEl.textContent = `${total} task${total === 1 ? '' : 's'}`;
      emptyStateEl.hidden = total !== 0;

      clearCompletedBtn.disabled = completed === 0;
    }

    function createItem(text) {
      const li = document.createElement('li');
      li.className = 'item';

      li.innerHTML = `
        <div class="left">
          <button class="check" type="button" aria-label="Mark complete">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M20 7L10 17l-4-4" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <span class="text" title="${escapeHtml(text)}">${escapeHtml(text)}</span>
        </div>
        <div class="actions">
          <button class="iconBtn deleteBtn" type="button" aria-label="Delete task" title="Delete">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      `;

      li.querySelector('.check').addEventListener('click', () => {
        li.classList.toggle('completed');
        updateCounts();
      });

      li.querySelector('.deleteBtn').addEventListener('click', () => {
        li.remove();
        updateCounts();
      });

      return li;
    }

    function addTask() {
      const text = taskInput.value.trim();
      if (!text) return;

      taskList.appendChild(createItem(text));
      taskInput.value = '';
      taskInput.focus();
      updateCounts();
    }

    addBtn.addEventListener('click', addTask);

    taskInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addTask();
    });

    clearCompletedBtn.addEventListener('click', () => {
      taskList.querySelectorAll('.item.completed').forEach(el => el.remove());
      updateCounts();
    });

    updateCounts();
    taskInput.focus();
  </script>
</body>
</html>

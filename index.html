<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do</title>

  <style>
    /* ===== Theme tokens (Apple-ish ultra-minimal) ===== */
    :root{
      --r: 18px;

      /* Light (default) */
      --bg: #f5f5f7;
      --bgA: rgba(0,113,227,.10);
      --bgB: rgba(52,199,89,.08);

      --card: rgba(255,255,255,.78);
      --surface: rgba(255,255,255,.92);
      --surface2: rgba(255,255,255,.70);

      --border: rgba(0,0,0,.08);
      --border2: rgba(0,0,0,.10);

      --text: #1d1d1f;
      --muted: rgba(29,29,31,.62);

      --blue: #0071e3;
      --green: #34c759;
      --red: #ff3b30;

      --shadow: 0 18px 40px rgba(0,0,0,.08);
      --hover: rgba(0,0,0,.05);
    }

    /* Dark theme overrides (applied when html[data-theme="dark"]) */
    html[data-theme="dark"]{
      --bg: #0b0b0f;
      --bgA: rgba(10,132,255,.20);
      --bgB: rgba(48,209,88,.14);

      --card: rgba(255,255,255,.07);
      --surface: rgba(255,255,255,.10);
      --surface2: rgba(255,255,255,.06);

      --border: rgba(255,255,255,.12);
      --border2: rgba(255,255,255,.16);

      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.62);

      --blue: #0a84ff;
      --green: #30d158;
      --red: #ff453a;

      --shadow: 0 22px 55px rgba(0,0,0,.55);
      --hover: rgba(255,255,255,.08);
    }

    *{ box-sizing: border-box; }
    html, body { height: 100%; }

    body{
      margin:0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 600px at 15% 10%, var(--bgA), transparent 60%),
        radial-gradient(900px 600px at 85% 20%, var(--bgB), transparent 60%),
        var(--bg);
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 28px 14px;
      transition: background-color .2s ease, color .2s ease;
    }

    .card{
      width: min(580px, 100%);
      border-radius: var(--r);
      background: var(--card);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      overflow: hidden;
    }

    header{
      padding: 16px 16px 12px;
      border-bottom: 1px solid rgba(0,0,0,.06);
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap: 12px;
    }
    html[data-theme="dark"] header{
      border-bottom-color: rgba(255,255,255,.08);
    }

    h1{
      margin:0;
      font-size: 18px;
      letter-spacing: -0.02em;
      font-weight: 700;
      line-height: 1.2;
    }

    .meta{
      font-size: 12px;
      color: var(--muted);
      user-select:none;
      white-space:nowrap;
    }

    .headRight{
      display:flex;
      align-items:center;
      gap: 10px;
    }

    /* Theme toggle (Apple-ish pill) */
    .toggle{
      display:inline-flex;
      align-items:center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface2);
      cursor:pointer;
      user-select:none;
      transition: background .15s ease, transform .12s ease, border-color .15s ease;
    }
    .toggle:hover{
      transform: translateY(-1px);
      border-color: var(--border2);
    }
    .toggle svg{ width: 14px; height: 14px; opacity: .85; }
    .toggle span{ font-size: 12px; color: var(--muted); font-weight: 600; }

    .main{
      padding: 14px 16px 16px;
      display:grid;
      gap: 12px;
    }

    .inputRow{
      display:flex;
      gap: 10px;
      align-items:center;
    }

    .field{
      flex:1;
      border-radius: 14px;
      border: 1px solid var(--border2);
      background: var(--surface);
      padding: 10px 12px;
      display:flex;
      align-items:center;
      gap: 10px;
      transition: box-shadow .15s ease, border-color .15s ease;
    }

    .field:focus-within{
      border-color: color-mix(in oklab, var(--blue) 35%, var(--border2));
      box-shadow: 0 0 0 4px color-mix(in oklab, var(--blue) 18%, transparent);
    }

    input{
      width:100%;
      border:0;
      outline:0;
      background: transparent;
      font-size: 14px;
      color: var(--text);
    }

    input::placeholder{ color: color-mix(in oklab, var(--muted) 75%, transparent); }

    .addBtn{
      border: 0;
      background: var(--blue);
      color: white;
      padding: 10px 14px;
      border-radius: 14px;
      font-weight: 700;
      font-size: 14px;
      cursor:pointer;
      transition: transform .12s ease, filter .12s ease;
      user-select:none;
    }

    .addBtn:hover{ transform: translateY(-1px); filter: brightness(1.02); }
    .addBtn:active{ transform: translateY(0px); filter: brightness(.98); }

    ul{
      list-style: none;
      padding: 0;
      margin: 0;
      display:grid;
      gap: 8px;
    }

    .item{
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      transition: box-shadow .15s ease, transform .15s ease, border-color .15s ease, background .15s ease;
    }

    .item:hover{
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(0,0,0,.06);
      border-color: var(--border2);
      background: color-mix(in oklab, var(--surface) 92%, var(--hover));
    }
    html[data-theme="dark"] .item:hover{
      box-shadow: 0 10px 22px rgba(0,0,0,.35);
    }

    .left{
      display:flex;
      align-items:center;
      gap: 10px;
      min-width: 0;
    }

    .check{
      width: 22px;
      height: 22px;
      border-radius: 999px;
      border: 1.5px solid color-mix(in oklab, var(--text) 18%, transparent);
      background: transparent;
      display:grid;
      place-items:center;
      cursor:pointer;
      flex:none;
      transition: transform .12s ease, border-color .15s ease, background .15s ease;
    }

    .check:hover{ transform: scale(1.02); }

    .check svg{
      width: 14px;
      height: 14px;
      opacity: 0;
      transform: scale(.7);
      transition: .12s ease;
      color: white;
    }

    .text{
      font-size: 14px;
      line-height: 1.25;
      overflow:hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .actions{
      display:flex;
      align-items:center;
      gap: 6px;
      flex:none;
    }

    .iconBtn{
      border: 0;
      background: transparent;
      padding: 8px;
      border-radius: 12px;
      cursor:pointer;
      color: color-mix(in oklab, var(--muted) 90%, transparent);
      transition: background .15s ease, color .15s ease, transform .12s ease;
    }

    .iconBtn:hover{
      background: var(--hover);
      color: color-mix(in oklab, var(--text) 75%, transparent);
      transform: translateY(-1px);
    }

    .iconBtn:active{ transform: translateY(0px); }

    .iconBtn svg{ width: 16px; height: 16px; }

    .item.completed .check{
      background: var(--green);
      border-color: color-mix(in oklab, var(--green) 70%, transparent);
    }

    .item.completed .check svg{
      opacity: 1;
      transform: scale(1);
    }

    .item.completed .text{
      color: color-mix(in oklab, var(--muted) 85%, transparent);
      text-decoration: line-through;
      text-decoration-thickness: 2px;
      text-decoration-color: color-mix(in oklab, var(--muted) 45%, transparent);
    }

    .empty{
      padding: 14px 12px;
      border-radius: 14px;
      border: 1px dashed color-mix(in oklab, var(--border2) 80%, transparent);
      background: var(--surface2);
      color: var(--muted);
      font-size: 13px;
    }

    .footer{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap: 10px;
      padding-top: 2px;
      font-size: 12px;
      color: var(--muted);
    }

    .linkBtn{
      border:0;
      background: transparent;
      cursor:pointer;
      color: color-mix(in oklab, var(--blue) 92%, transparent);
      padding: 6px 8px;
      border-radius: 12px;
      font-weight: 700;
      transition: background .15s ease;
    }

    .linkBtn:hover{ background: color-mix(in oklab, var(--blue) 14%, transparent); }
    .linkBtn:disabled{ opacity:.45; cursor:not-allowed; }

    @media (prefers-reduced-motion: reduce){
      *{ transition:none !important; }
    }
  </style>
</head>

<body>
  <div class="card">
    <header>
      <div>
        <h1>To-Do</h1>
        <div class="meta">Enter to add • Circle to complete</div>
      </div>

      <div class="headRight">
        <div class="meta"><span id="remainingCount">0</span> remaining</div>

        <button class="toggle" id="themeToggle" type="button" aria-label="Toggle theme" title="Toggle theme">
          <!-- icon swaps in JS -->
          <span id="themeLabel">Light</span>
          <svg id="themeIcon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 18a6 6 0 1 0 0-12 6 6 0 0 0 0 12Z" stroke="currentColor" stroke-width="2"/>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </header>

    <div class="main">
      <div class="inputRow">
        <div class="field">
          <input id="taskInput" type="text" placeholder="Add a task…" autocomplete="off" />
        </div>
        <button class="addBtn" id="addBtn" type="button">Add</button>
      </div>

      <div id="emptyState" class="empty" hidden>No tasks yet.</div>

      <ul id="taskList"></ul>

      <div class="footer">
        <span id="totalCount">0 tasks</span>
        <button class="linkBtn" id="clearCompletedBtn" type="button">Clear completed</button>
      </div>
    </div>
  </div>

  <script>
    const taskInput = document.getElementById('taskInput');
    const taskList = document.getElementById('taskList');
    const addBtn = document.getElementById('addBtn');

    const remainingCountEl = document.getElementById('remainingCount');
    const totalCountEl = document.getElementById('totalCount');
    const emptyStateEl = document.getElementById('emptyState');
    const clearCompletedBtn = document.getElementById('clearCompletedBtn');

    const themeToggle = document.getElementById('themeToggle');
    const themeLabel = document.getElementById('themeLabel');
    const themeIcon = document.getElementById('themeIcon');

    const SUN_ICON = `
      <path d="M12 18a6 6 0 1 0 0-12 6 6 0 0 0 0 12Z" stroke="currentColor" stroke-width="2"/>
      <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    `;

    const MOON_ICON = `
      <path d="M21 13.2A7.8 7.8 0 0 1 10.8 3a7 7 0 1 0 10.2 10.2Z"
        stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
    `;

    function escapeHtml(str) {
      return str
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function updateCounts() {
      const items = Array.from(taskList.querySelectorAll('.item'));
      const completed = items.filter(i => i.classList.contains('completed')).length;
      const total = items.length;
      const remaining = total - completed;

      remainingCountEl.textContent = remaining;
      totalCountEl.textContent = `${total} task${total === 1 ? '' : 's'}`;
      emptyStateEl.hidden = total !== 0;
      clearCompletedBtn.disabled = completed === 0;
    }

    function createItem(text) {
      const li = document.createElement('li');
      li.className = 'item';

      li.innerHTML = `
        <div class="left">
          <button class="check" type="button" aria-label="Mark complete">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M20 7L10 17l-4-4" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <span class="text" title="${escapeHtml(text)}">${escapeHtml(text)}</span>
        </div>
        <div class="actions">
          <button class="iconBtn deleteBtn" type="button" aria-label="Delete task" title="Delete">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      `;

      li.querySelector('.check').addEventListener('click', () => {
        li.classList.toggle('completed');
        updateCounts();
      });

      li.querySelector('.deleteBtn').addEventListener('click', () => {
        li.remove();
        updateCounts();
      });

      return li;
    }

    function addTask() {
      const text = taskInput.value.trim();
      if (!text) return;

      taskList.appendChild(createItem(text));
      taskInput.value = '';
      taskInput.focus();
      updateCounts();
    }

    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);

      const isDark = theme === 'dark';
      themeLabel.textContent = isDark ? 'Dark' : 'Light';
      themeIcon.innerHTML = isDark ? MOON_ICON : SUN_ICON;
      themeToggle.setAttribute('aria-pressed', isDark ? 'true' : 'false');
    }

    function initTheme() {
      const saved = localStorage.getItem('theme');
      if (saved === 'light' || saved === 'dark') {
        setTheme(saved);
        return;
      }
      // If no saved theme, follow system preference
      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      setTheme(prefersDark ? 'dark' : 'light');
    }

    // Events
    addBtn.addEventListener('click', addTask);
    taskInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addTask();
    });

    clearCompletedBtn.addEventListener('click', () => {
      taskList.querySelectorAll('.item.completed').forEach(el => el.remove());
      updateCounts();
    });

    themeToggle.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
      setTheme(current === 'dark' ? 'light' : 'dark');
    });

    // Init
    initTheme();
    updateCounts();
    taskInput.focus();
  </script>
</body>
</html>

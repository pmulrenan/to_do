<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do</title>

  <style>
    :root{
      --bg: #f5f5f7;
      --card: rgba(255,255,255,.78);
      --border: rgba(0,0,0,.08);
      --text: #1d1d1f;
      --muted: rgba(29,29,31,.62);

      --blue: #0071e3;
      --green: #34c759;
      --red: #ff3b30;

      --r: 18px;
      --shadow: 0 18px 40px rgba(0,0,0,.08);
    }

    *{ box-sizing: border-box; }
    html, body { height: 100%; }

    body{
      margin:0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 600px at 15% 10%, rgba(0,113,227,.10), transparent 60%),
        radial-gradient(900px 600px at 85% 20%, rgba(52,199,89,.08), transparent 60%),
        var(--bg);
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 28px 14px;
    }

    .card{
      width: min(560px, 100%);
      border-radius: var(--r);
      background: var(--card);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      overflow: hidden;
    }

    header{
      padding: 18px 18px 12px;
      border-bottom: 1px solid rgba(0,0,0,.06);
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap: 12px;
    }

    h1{
      margin:0;
      font-size: 18px;
      letter-spacing: -0.02em;
      font-weight: 700;
      line-height: 1.2;
    }

    .meta{
      font-size: 12px;
      color: var(--muted);
      user-select:none;
      white-space:nowrap;
    }

    .main{
      padding: 14px 18px 18px;
      display:grid;
      gap: 12px;
    }

    /* Input */
    .inputRow{
      display:flex;
      gap: 10px;
      align-items:center;
    }

    .field{
      flex:1;
      border-radius: 14px;
      border: 1px solid rgba(0,0,0,.10);
      background: rgba(255,255,255,.92);
      padding: 10px 12px;
      display:flex;
      align-items:center;
      gap: 10px;
      transition: box-shadow .15s ease, border-color .15s ease;
    }

    .field:focus-within{
      border-color: rgba(0,113,227,.35);
      box-shadow: 0 0 0 4px rgba(0,113,227,.10);
    }

    input{
      width:100%;
      border:0;
      outline:0;
      background: transparent;
      font-size: 14px;
      color: var(--text);
    }

    input::placeholder{ color: rgba(29,29,31,.45); }

    .addBtn{
      border: 0;
      background: var(--blue);
      color: white;
      padding: 10px 14px;
      border-radius: 14px;
      font-weight: 600;
      font-size: 14px;
      cursor:pointer;
      transition: transform .12s ease, filter .12s ease;
      user-select:none;
    }

    .addBtn:hover{ transform: translateY(-1px); filter: brightness(1.02); }
    .addBtn:active{ transform: translateY(0px); filter: brightness(.98); }

    /* List */
    ul{
      list-style: none;
      padding: 0;
      margin: 0;
      display:grid;
      gap: 8px;
    }

    .item{
      background: rgba(255,255,255,.92);
      border: 1px solid rgba(0,0,0,.06);
      border-radius: 14px;
      padding: 10px 10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      transition: box-shadow .15s ease, transform .15s ease, border-color .15s ease;
    }

    .item:hover{
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(0,0,0,.06);
      border-color: rgba(0,0,0,.08);
    }

    .left{
      display:flex;
      align-items:center;
      gap: 10px;
      min-width: 0;
    }

    .check{
      width: 22px;
      height: 22px;
      border-radius: 999px;
      border: 1.5px solid rgba(0,0,0,.18);
      background: transparent;
      display:grid;
      place-items:center;
      cursor:pointer;
      flex:none;
      transition: transform .12s ease, border-color .15s ease, background .15s ease;
    }

    .check:hover{ transform: scale(1.02); }

    .check svg{
      width: 14px;
      height: 14px;
      opacity: 0;
      transform: scale(.7);
      transition: .12s ease;
      color: white;
    }

    .text{
      font-size: 14px;
      line-height: 1.25;
      overflow:hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .actions{
      display:flex;
      align-items:center;
      gap: 6px;
      flex:none;
    }

    .iconBtn{
      border: 0;
      background: transparent;
      padding: 8px;
      border-radius: 12px;
      cursor:pointer;
      color: rgba(29,29,31,.55);
      transition: background .15s ease, color .15s ease, transform .12s ease;
    }

    .iconBtn:hover{
      background: rgba(0,0,0,.05);
      color: rgba(29,29,31,.80);
      transform: translateY(-1px);
    }

    .iconBtn:active{ transform: translateY(0px); }

    .iconBtn svg{ width: 16px; height: 16px; }

    /* Completed */
    .item.completed .check{
      background: var(--green);
      border-color: rgba(52,199,89,.65);
    }

    .item.completed .check svg{
      opacity: 1;
      transform: scale(1);
    }

    .item.completed .text{
      color: rgba(29,29,31,.45);
      text-decoration: line-through;
      text-decoration-thickness: 2px;
      text-decoration-color: rgba(29,29,31,.22);
    }

    /* Empty / Footer */
    .empty{
      padding: 14px 12px;
      border-radius: 14px;
      border: 1px dashed rgba(0,0,0,.12);
      background: rgba(255,255,255,.70);
      color: var(--muted);
      font-size: 13px;
    }

    .footer{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap: 10px;
      padding-top: 2px;
      font-size: 12px;
      color: var(--muted);
    }

    .linkBtn{
      border:0;
      background: transparent;
      cursor:pointer;
      color: rgba(0,113,227,.95);
      padding: 6px 8px;
      border-radius: 12px;
      font-weight: 600;
      transition: background .15s ease;
    }

    .linkBtn:hover{ background: rgba(0,113,227,.10); }
    .linkBtn:disabled{ opacity:.45; cursor:not-allowed; }

    @media (prefers-reduced-motion: reduce){
      *{ transition:none !important; }
    }
  </style>
</head>

<body>
  <div class="card">
    <header>
      <div>
        <h1>To-Do</h1>
        <div class="meta">Press Enter to add • Click the circle to complete</div>
      </div>
      <div class="meta"><span id="remainingCount">0</span> remaining</div>
    </header>

    <div class="main">
      <div class="inputRow">
        <div class="field">
          <input id="taskInput" type="text" placeholder="Add a task…" autocomplete="off" />
        </div>
        <button class="addBtn" id="addBtn" type="button">Add</button>
      </div>

      <div id="emptyState" class="empty" hidden>
        No tasks yet.
      </div>

      <ul id="taskList"></ul>

      <div class="footer">
        <span id="totalCount">0 tasks</span>
        <button class="linkBtn" id="clearCompletedBtn" type="button">Clear completed</button>
      </div>
    </div>
  </div>

  <script>
    const taskInput = document.getElementById('taskInput');
    const taskList = document.getElementById('taskList');
    const addBtn = document.getElementById('addBtn');

    const remainingCountEl = document.getElementById('remainingCount');
    const totalCountEl = document.getElementById('totalCount');
    const emptyStateEl = document.getElementById('emptyState');
    const clearCompletedBtn = document.getElementById('clearCompletedBtn');

    function escapeHtml(str) {
      return str
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function updateCounts() {
      const items = Array.from(taskList.querySelectorAll('.item'));
      const completed = items.filter(i => i.classList.contains('completed')).length;
      const total = items.length;
      const remaining = total - completed;

      remainingCountEl.textContent = remaining;
      totalCountEl.textContent = `${total} task${total === 1 ? '' : 's'}`;
      emptyStateEl.hidden = total !== 0;

      clearCompletedBtn.disabled = completed === 0;
    }

    function createItem(text) {
      const li = document.createElement('li');
      li.className = 'item';

      li.innerHTML = `
        <div class="left">
          <button class="check" type="button" aria-label="Mark complete">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M20 7L10 17l-4-4" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <span class="text" title="${escapeHtml(text)}">${escapeHtml(text)}</span>
        </div>
        <div class="actions">
          <button class="iconBtn deleteBtn" type="button" aria-label="Delete task" title="Delete">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      `;

      li.querySelector('.check').addEventListener('click', () => {
        li.classList.toggle('completed');
        updateCounts();
      });

      li.querySelector('.deleteBtn').addEventListener('click', () => {
        li.remove();
        updateCounts();
      });

      return li;
    }

    function addTask() {
      const text = taskInput.value.trim();
      if (!text) return;

      taskList.appendChild(createItem(text));
      taskInput.value = '';
      taskInput.focus();
      updateCounts();
    }

    addBtn.addEventListener('click', addTask);

    taskInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addTask();
    });

    clearCompletedBtn.addEventListener('click', () => {
      taskList.querySelectorAll('.item.completed').forEach(el => el.remove());
      updateCounts();
    });

    updateCounts();
    taskInput.focus();
  </script>
</body>
</html>
